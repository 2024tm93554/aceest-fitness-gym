apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-stable
spec:
  replicas: 9
  selector:
    matchLabels:
      app: aceest
      version: stable
  template:
    metadata:
      labels:
        app: aceest
        version: stable
    spec:
      containers:
      - name: aceest
        image: joykiruba/aceest:v1
        ports:
        - containerPort: 80
